# kitty — matched to the Hyprland rice (soft pink on dark plum)
# Palette derived from hyprlock/colors.conf ($text_color = #f8dbe4)

# ── Shell ─────────────────────────────────────────────────────────────
# fish lives here only. The LOGIN shell stays bash on purpose:
# agetty --autologin nox → bash → ~/.bash_profile → exec start-hyprland
# Changing the login shell would break that launch chain. Don't.
shell /usr/bin/fish

# ── Font ──────────────────────────────────────────────────────────────
font_family      CaskaydiaCove Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never
adjust_line_height 105%

# ── Window ────────────────────────────────────────────────────────────
window_padding_width 12
background_opacity   0.85
dynamic_background_opacity yes
confirm_os_window_close 0
remember_window_size  no
initial_window_width  1100
initial_window_height 650
hide_window_decorations yes

# ── Cursor ────────────────────────────────────────────────────────────
cursor_shape           beam
cursor_beam_thickness  1.6
cursor_blink_interval  0.5
cursor_stop_blinking_after 10.0

# ── Scrollback ────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager bat --style=plain --paging=always
wheel_scroll_multiplier 3.0

# ── Bell ──────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── URLs ──────────────────────────────────────────────────────────────
url_style curly
detect_urls yes
open_url_with default

# ── Tabs ──────────────────────────────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_title_template      "{index}: {title}"
active_tab_foreground   #161013
active_tab_background   #f2a1bd
active_tab_font_style   bold
inactive_tab_foreground #958f90
inactive_tab_background #2a1f26
inactive_tab_font_style normal

# ── Colours: rice pink / dark plum ────────────────────────────────────
background            #161013
foreground            #f8dbe4
selection_background  #4a2f3a
selection_foreground  #f8dbe4
cursor                #f2a1bd
cursor_text_color     #161013
url_color             #c99ade

# Window borders
active_border_color   #f2a1bd
inactive_border_color #3a2833
bell_border_color     #ff6b8b

# normal
color0  #2a1f26
color1  #ff6b8b
color2  #a8d98a
color3  #f0c674
color4  #8ab4f8
color5  #e39ff6
color6  #7fd6d2
color7  #f8dbe4
# bright
color8  #5c4a54
color9  #ff8fa8
color10 #c1e6a8
color11 #f7d98c
color12 #a9c8fa
color13 #f0bcff
color14 #a2e5e2
color15 #ffffff

# ── Keybindings ───────────────────────────────────────────────────────
# Tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

# Splits (kitty calls them windows)
map ctrl+shift+enter launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Font size
map ctrl+plus  change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

# Opacity on the fly
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Open scrollback in neovim
map ctrl+shift+g show_scrollback
